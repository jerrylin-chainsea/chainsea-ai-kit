<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>我的 AI 小店</title>
<style>
  :root { --orange:#e2570d; --ink:#181a1f; }
  * { margin:0; box-sizing:border-box; font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; }
  html,body { height:100%; overflow:hidden; background:#f3ead9; }
  #app { position:fixed; inset:0; }
  .hud { position:absolute; pointer-events:none; }
  .card { background:rgba(255,255,255,.85); backdrop-filter:blur(6px); border:1px solid #eaddcb;
          border-radius:16px; padding:11px 16px; box-shadow:0 10px 30px -16px rgba(60,40,10,.4); }
  #brandTag { top:18px; left:18px; }
  #brandTag .name { font-size:24px; font-weight:800; color:var(--ink); }
  #brandTag .sub { font-size:13px; color:#8a7a60; margin-top:2px; }
  #stats { top:18px; right:18px; text-align:right; min-width:160px; }
  #stats .day { font-size:13px; color:#8a7a60; }
  #stats .rev { font-size:28px; font-weight:900; color:var(--orange); line-height:1.1; }
  #stats .status { font-size:13px; margin-top:3px; color:#0e9b63; font-weight:700; }
  #stats .status.busy { color:#c0392b; }
  .panel { bottom:18px; left:18px; width:340px; }
  .panel .h { font-size:12px; font-weight:800; letter-spacing:.08em; color:var(--orange); margin-bottom:7px; }
  /* M12 四欄 */
  #m12 .row { display:flex; gap:8px; font-size:13px; line-height:1.4; padding:4px 6px; border-radius:8px; transition:background .3s; }
  #m12 .row.active { background:#fff0e3; }
  #m12 .k { color:#8a7a60; white-space:nowrap; font-weight:700; }
  #m12 .v.hi { color:#c0392b; font-weight:800; }
  /* M14 日誌 */
  #m14 { display:none; }
  #m14 .log { display:flex; flex-direction:column; gap:5px; }
  #m14 .li { font-size:13px; line-height:1.35; color:var(--ink); padding:5px 8px; background:#eef7f1; border-radius:8px; border-left:3px solid #0e9b63; }
  #m14 .li.warn { background:#fdecea; border-left-color:#c0392b; }
  #m14 .empty { font-size:13px; color:#8a7a60; }
  #controls { left:50%; bottom:20px; transform:translateX(-50%); pointer-events:auto; display:flex; gap:10px; }
  .btn { pointer-events:auto; cursor:pointer; border:1px solid #eaddcb; border-radius:999px; padding:11px 18px;
         font-size:15px; font-weight:700; background:#fff; color:var(--ink); box-shadow:0 8px 22px -14px rgba(60,40,10,.5); white-space:nowrap; }
  .btn.on { background:var(--orange); color:#fff; border-color:var(--orange); }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; font-size:20px; color:#8a7a60; background:#f3ead9; z-index:5; }
</style>
</head>
<body>
<div id="loading">載入小店中… 🏪</div>
<div id="app"></div>
<div class="hud card" id="brandTag"><div class="name" id="brandName">我的小店</div><div class="sub" id="modeSub">M12:三個 AI 角色幫你看資料、給建議</div></div>
<div class="hud card" id="stats"><div class="day" id="dayLabel">第 1 天</div><div class="rev" id="revLabel">$0</div><div class="status" id="statusLabel">正常營運</div></div>
<div class="hud card panel" id="m12">
  <div class="h">M12 決策摘要(三角色接力產出 · 給建議)</div>
  <div class="row" data-f="anom"><span class="k">① 檢查</span><span class="v" id="vAnom">-</span></div>
  <div class="row" data-f="insight"><span class="k">② 分析</span><span class="v" id="vInsight">-</span></div>
  <div class="row" data-f="action"><span class="k">③ 決策</span><span class="v" id="vAction">-</span></div>
  <div class="row" data-f="risk"><span class="k">風險</span><span class="v hi" id="vRisk">-</span></div>
</div>
<div class="hud card panel" id="m14">
  <div class="h">🤖 AI 自動經營日誌(agent 自己處置,不用人決定)</div>
  <div class="log" id="m14log"><div class="empty">營運中… 出狀況時 agent 會自己動手</div></div>
</div>
<div class="hud" id="controls">
  <button class="btn on" id="modeBtn">模式:M12 給建議</button>
</div>

<script src="data.js" onerror="void 0"></script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { clone as skClone } from 'three/addons/utils/SkeletonUtils.js';

// 預設通用範例(學員自己的店);跑 M12 筆記本會產生 data.js 覆蓋成你算出來的
const D = window.SHOP_DATA || {
  brand: "我的小店",
  insight: "這是範例。跑 M12 筆記本後,這裡會換成你算出來的洞察",
  anomalies: ["範例:某筆數量是負數", "範例:某筆數量異常大"],
  risk_level: "中",
  action_items: ["範例:先確認那兩筆", "範例:該補貨的補貨", "範例:外送加開一條線"],
};
document.getElementById('brandName').textContent = D.brand;
document.getElementById('vRisk').textContent = D.risk_level || "-";

let MODE = new URLSearchParams(location.search).get('mode') || 'm12';  // 'm12' | 'm14'

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color('#f3ead9'); scene.fog=new THREE.Fog('#f3ead9',26,46);
const camera=new THREE.PerspectiveCamera(44,innerWidth/innerHeight,0.1,100);
scene.add(new THREE.HemisphereLight('#fff6e8','#d8c4a0',1.0));
const sun=new THREE.DirectionalLight('#ffd9a0',1.5); sun.position.set(6,13,7); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=44; Object.assign(sun.shadow.camera,{left:-16,right:16,top:16,bottom:-16}); sun.shadow.radius=6; scene.add(sun);
const mat=(c,r=0.85,m=0)=>new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});

const ground=new THREE.Mesh(new THREE.CylinderGeometry(15,15,0.6,48),mat('#e9d9bd')); ground.position.y=-0.3; ground.receiveShadow=true; scene.add(ground);
const plaza=new THREE.Mesh(new THREE.CylinderGeometry(8.4,8.4,0.62,48),mat('#f0e6d2')); plaza.position.y=-0.28; plaza.receiveShadow=true; scene.add(plaza);
const matAt=new THREE.Mesh(new THREE.CircleGeometry(1.5,24),mat('#e2570d',0.9)); matAt.rotation.x=-Math.PI/2; matAt.position.set(0,0.02,2.6); matAt.receiveShadow=true; scene.add(matAt);

const shop=new THREE.Group(); shop.position.set(0,0,-1.2); scene.add(shop);
const body=new THREE.Mesh(new RoundedBoxGeometry(5,3.4,4,4,0.45),mat('#f6c89a')); body.position.y=1.7; body.castShadow=body.receiveShadow=true; shop.add(body);
const roof=new THREE.Mesh(new THREE.ConeGeometry(3.25,1.5,4),mat('#c0633a')); roof.position.y=3.95; roof.rotation.y=Math.PI/4; roof.castShadow=true; shop.add(roof);
const door=new THREE.Mesh(new RoundedBoxGeometry(1.3,2.0,0.2,3,0.2),mat('#8a4a2a')); door.position.set(0,1.0,2.02); shop.add(door);
const winMat=new THREE.MeshStandardMaterial({color:'#ffe2a8',emissive:'#ffb347',emissiveIntensity:0.7,roughness:0.4});
for(const x of [-1.6,1.6]){const w=new THREE.Mesh(new RoundedBoxGeometry(1.0,1.0,0.15,3,0.15),winMat); w.position.set(x,1.9,2.0); shop.add(w);}
for(let i=0;i<7;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.12,0.9),mat(i%2?'#e2570d':'#fff4e6')); s.position.set(-2.16+i*0.72,2.95,2.35); s.rotation.x=-0.5; s.castShadow=true; shop.add(s);}
function signTex(t){const c=document.createElement('canvas');c.width=512;c.height=160;const x=c.getContext('2d');
  x.fillStyle='#fff7ec';x.fillRect(0,0,512,160);x.lineWidth=10;x.strokeStyle='#e2570d';x.strokeRect(8,8,496,144);
  x.fillStyle='#3a2a18';x.font='bold 80px "PingFang TC","Noto Sans TC",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(t,256,86);
  const tx=new THREE.CanvasTexture(c);tx.anisotropy=4;return tx;}
const sign=new THREE.Mesh(new THREE.PlaneGeometry(2.9,0.9),new THREE.MeshBasicMaterial({map:signTex(D.brand)})); sign.position.set(0,2.5,2.03); shop.add(sign);

function plant(x,z){const g=new THREE.Group();const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.24,0.5,12),mat('#c87f4a'));pot.position.y=0.25;pot.castShadow=true;
  const leaf=new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12),mat('#7bb661'));leaf.position.y=0.85;leaf.scale.y=1.2;leaf.castShadow=true;g.add(pot,leaf);g.position.set(x,0,z);scene.add(g);}
function crate(x,z,r=0){const m=new THREE.Mesh(new RoundedBoxGeometry(0.8,0.8,0.8,2,0.08),mat('#d8a86a'));m.position.set(x,0.4,z);m.rotation.y=r;m.castShadow=true;scene.add(m);return m;}
function lantern(x,y,z){const g=new THREE.Group();const b=new THREE.Mesh(new THREE.SphereGeometry(0.32,16,12),new THREE.MeshStandardMaterial({color:'#e8533a',emissive:'#e2570d',emissiveIntensity:0.5,roughness:0.5}));b.scale.y=0.85;
  const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.12,10),mat('#8a4a2a'));cap.position.y=0.34;g.add(b,cap);g.position.set(x,y,z);scene.add(g);return g;}
plant(-3.6,0.6);plant(3.7,0.4);plant(-2.8,-2.2);crate(3.4,-1.4);crate(3.9,-1.0,0.4);crate(3.6,-1.9,0.8);
const lanterns=[lantern(-2.7,3.0,0.6),lantern(2.7,3.0,0.6)];

const steamN=26,steamGeo=new THREE.BufferGeometry(),sp=new Float32Array(steamN*3);
for(let i=0;i<steamN;i++){sp[i*3]=(Math.random()-0.5)*1.4;sp[i*3+1]=Math.random()*2;sp[i*3+2]=-1.2+(Math.random()-0.5)*1.4;}
steamGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
const steam=new THREE.Points(steamGeo,new THREE.PointsMaterial({color:'#fff',size:0.5,transparent:true,opacity:0.35,depthWrite:false}));steam.position.set(0,3.6,0);scene.add(steam);

const coins=[],coinGeo=new THREE.CylinderGeometry(0.26,0.26,0.07,16);
const coinMat=new THREE.MeshStandardMaterial({color:'#ffcf4d',emissive:'#b97c00',emissiveIntensity:0.25,metalness:0.6,roughness:0.3});
function coinAt(x,z){const c=new THREE.Mesh(coinGeo,coinMat.clone());c.rotation.x=Math.PI/2;c.position.set(x,2.4,z);c.castShadow=true;scene.add(c);coins.push({c,v:2.2+Math.random()});}

function labelSprite(text,color){const c=document.createElement('canvas');c.width=320;c.height=80;const x=c.getContext('2d');
  x.fillStyle=color;x.beginPath();x.roundRect(6,6,308,68,18);x.fill();
  x.fillStyle='#fff';x.font='bold 34px "PingFang TC","Noto Sans TC",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(text,160,42);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));s.scale.set(1.7,0.42,1);return s;}
function bubbleTex(text){const c=document.createElement('canvas');c.width=480;c.height=190;const x=c.getContext('2d');x.clearRect(0,0,480,190);
  x.fillStyle='#fff';x.strokeStyle='#eaddcb';x.lineWidth=4;x.beginPath();x.roundRect(8,8,464,140,26);x.fill();x.stroke();
  x.beginPath();x.moveTo(70,148);x.lineTo(54,184);x.lineTo(110,148);x.fillStyle='#fff';x.fill();
  x.fillStyle='#2b2118';x.font='600 36px "PingFang TC","Noto Sans TC",sans-serif';x.textAlign='center';x.textBaseline='middle';
  const ch=[...text];let ln='';const L=[];for(const k of ch){if(x.measureText(ln+k).width>410){L.push(ln);ln=k;}else ln+=k;}L.push(ln);
  L.slice(0,2).forEach((s,i)=>x.fillText(s,240,52+i*46));return new THREE.CanvasTexture(c);}

const m12rows={}; document.querySelectorAll('#m12 .row').forEach(r=>m12rows[r.dataset.f]=r);
const vAnom=document.getElementById('vAnom'),vInsight=document.getElementById('vInsight'),vAction=document.getElementById('vAction');
function setActive(f){for(const k in m12rows)m12rows[k].classList.toggle('active',k===f);}

let day=1,revenue=0,dayTimer=0; let anomI=0,actI=0;
const revLabel=document.getElementById('revLabel'),dayLabel=document.getElementById('dayLabel'),statusLabel=document.getElementById('statusLabel');
const modeBtn=document.getElementById('modeBtn'),modeSub=document.getElementById('modeSub');
function applyMode(){
  document.getElementById('m12').style.display = MODE==='m12'?'block':'none';
  document.getElementById('m14').style.display = MODE==='m14'?'block':'none';
  modeBtn.textContent = '模式:'+(MODE==='m12'?'M12 給建議':'M14 自動經營');
  modeSub.textContent = MODE==='m12' ? 'M12:三個 AI 角色幫你看資料、給建議' : 'M14:出狀況時 agent 自己動手顧店(不用人決定)';
}
modeBtn.onclick=()=>{ MODE = MODE==='m12'?'m14':'m12'; applyMode(); };
applyMode();

// ── GLTF ──
const loader=new GLTFLoader(); const load=u=>new Promise(r=>loader.load(u,r));
const mixers=[],agents=[],customers=[]; let foxGLTF,duckGLTF,robotAnims;
const AGENT_DEF=[{role:"資料檢查員",color:"#2f6fd0",x:-5.3},{role:"分析洞察員",color:"#e2570d",x:-3.0},{role:"決策摘要員",color:"#0e9b63",x:-0.7}];
let ready=false, pipeStage=0, pipeT=0.8;

function clipAct(mx,anims,name){const c=THREE.AnimationClip.findByName(anims,name); return c?mx.clipAction(c):null;}
function setAgentAnim(a,name,once=false){ if(a.cur===name)return; const nx=a.acts[name]; if(!nx)return;
  if(a.curAct){a.curAct.fadeOut(0.2);} nx.reset(); nx.setLoop(once?THREE.LoopOnce:THREE.LoopRepeat); nx.clampWhenFinished=once; nx.fadeIn(0.2).play(); a.curAct=nx; a.cur=name; }

Promise.all([load('./assets/RobotExpressive.glb'),load('./assets/Fox.glb'),load('./assets/Duck.glb')]).then(([robot,fox,duck])=>{
  foxGLTF=fox; duckGLTF=duck; robotAnims=robot.animations;
  AGENT_DEF.forEach((d)=>{
    const g=skClone(robot.scene); g.scale.setScalar(0.34); g.position.set(d.x,0,3.4); g.rotation.y=0.15; g.traverse(o=>{if(o.isMesh)o.castShadow=true;}); scene.add(g);
    const mx=new THREE.AnimationMixer(g);
    const acts={ Idle:clipAct(mx,robotAnims,'Idle'), Walking:clipAct(mx,robotAnims,'Walking'), Wave:clipAct(mx,robotAnims,'Wave'), Running:clipAct(mx,robotAnims,'Running') };
    mixers.push(mx);
    const disc=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.7,0.08,20),mat(d.color,0.6)); disc.position.set(d.x,0.04,3.4); disc.receiveShadow=true; scene.add(disc);
    const lab=labelSprite(d.role,d.color); lab.position.set(d.x,2.5,3.4); scene.add(lab);
    const bub=new THREE.Sprite(new THREE.SpriteMaterial({map:bubbleTex('...'),transparent:true,opacity:0})); bub.scale.set(3.0,1.2,1); bub.position.set(d.x,3.5,3.4); scene.add(bub);
    const a={g,mx,acts,curAct:null,cur:null,bub,disc,home:new THREE.Vector3(d.x,0,3.4),state:'idle',_bubLife:0,...d};
    setAgentAnim(a,'Idle'); agents.push(a);
  });
  ready=true; document.getElementById('loading').style.display='none'; tick();
});

function spawnCustomer(){ const useFox=Math.random()<0.6; const src=useFox?foxGLTF:duckGLTF;
  const g=skClone(src.scene); g.scale.setScalar(useFox?0.018:0.0024); g.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  const ang=(Math.random()*0.8+0.1)*Math.PI; g.position.set(Math.cos(ang)*8,0,Math.abs(Math.sin(ang))*7+1.5);
  let mx=null; if(useFox&&src.animations.length){mx=new THREE.AnimationMixer(g); const w=THREE.AnimationClip.findByName(src.animations,'Walk')||src.animations[0]; mx.clipAction(w).play(); mixers.push(mx);}
  scene.add(g); customers.push({g,mx,useFox}); }

function speak(a,text,life=2.4){ a.bub.material.map=bubbleTex(text); a.bub.material.needsUpdate=true; a.bub.material.opacity=1; a._bubLife=life;
  const w=a.acts.Wave; if(w){w.reset(); setAgentAnim(a,'Wave',true);} }
function addCoins(n,base){ for(let k=0;k<n;k++) setTimeout(()=>{revenue+=base+(Math.random()*18|0); revLabel.textContent='$'+revenue.toLocaleString(); coinAt((Math.random()-0.5)*2,2.0);},k*150); }

// ── M12:三角色接力給建議 ──
function stepM12(dt){ pipeT-=dt; if(pipeT>0)return; const a=agents[pipeStage];
  if(pipeStage===0){const t=D.anomalies[anomI++%D.anomalies.length]; vAnom.textContent=t; setActive('anom'); speak(a,"抓到:"+t);}
  if(pipeStage===1){vInsight.textContent=D.insight; setActive('insight'); speak(a,D.insight);}
  if(pipeStage===2){const t=D.action_items[actI++%D.action_items.length]; vAction.textContent=t; setActive('action'); speak(a,"建議:"+t); addCoins(3,28);}
  pipeStage=(pipeStage+1)%3; pipeT=1.6;
}

// ── M14:agent 偵測 → 自己動手處置(自動經營)──
const M14_EVENTS=[
  {label:"泡菜內餡 缺料",agent:0,act:"已自動補貨:泡菜內餡",kind:'restock'},
  {label:"網站價格標錯",agent:2,act:"已自動撤下錯價、發更正",kind:'price'},
  {label:"午餐爆單",agent:1,act:"已自動加開外送線",kind:'surge'},
  {label:"AI 建議沒依據",agent:2,act:"已暫停採用、要求依據",kind:'pause'},
];
let evTimer=3, evIdx=0, activeEv=null, actor=null, alertSprite=null, restockCrates=[];
const m14log=document.getElementById('m14log');
function pushLog(text,warn){ const e=m14log.querySelector('.empty'); if(e)e.remove();
  const d=document.createElement('div'); d.className='li'+(warn?' warn':''); d.textContent=text; m14log.prepend(d);
  while(m14log.children.length>4) m14log.lastChild.remove(); }
function showAlert(label){ if(!alertSprite){alertSprite=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true})); alertSprite.scale.set(3.4,1.0,1); alertSprite.position.set(0,5.0,-0.5); scene.add(alertSprite);}
  alertSprite.material.map=bubbleTex("⚠ "+label); alertSprite.material.needsUpdate=true; alertSprite.material.opacity=1; }
function stepM14(dt){ if(activeEv){ // 處置進行中
    if(actor.state==='going'){ const tgt=new THREE.Vector3(actor.x*0.25,0,1.5); actor.g.position.lerp(tgt,Math.min(1,dt*2.4)); actor.g.lookAt(0,0,2.6); setAgentAnim(actor,'Walking');
      if(actor.g.position.distanceTo(tgt)<0.4){ actor.state='acting'; actor._t=1.4; speak(actor,"處置中:"+activeEv.label,1.6);} }
    else if(actor.state==='acting'){ actor._t-=dt; if(actor._t<=0){ doFix(activeEv); pushLog("✓ "+activeEv.act); actor.state='returning';
        if(alertSprite)alertSprite.material.opacity=0; statusLabel.textContent='正常營運'; statusLabel.classList.remove('busy'); } }
    else if(actor.state==='returning'){ actor.g.position.lerp(actor.home,Math.min(1,dt*2.4)); actor.g.lookAt(0,0,2.6); setAgentAnim(actor,'Walking');
      if(actor.g.position.distanceTo(actor.home)<0.3){ actor.g.position.copy(actor.home); actor.g.rotation.y=0.15; setAgentAnim(actor,'Idle'); actor.state='idle'; activeEv=null; actor=null; } }
    return; }
  evTimer-=dt; if(evTimer<=0){ activeEv=M14_EVENTS[evIdx++%M14_EVENTS.length]; actor=agents[activeEv.agent]; actor.state='going';
    showAlert(activeEv.label); pushLog("⚠ 偵測:"+activeEv.label, true); statusLabel.textContent='處置中…'; statusLabel.classList.add('busy'); evTimer=6.5; }
}
function doFix(ev){ if(ev.kind==='restock'){ for(let i=0;i<3;i++){const c=crate(-0.8+i*0.8,2.9,0); c.scale.setScalar(0.01); restockCrates.push({c,t:0});} addCoins(2,20); }
  else if(ev.kind==='surge'){ addCoins(5,34); }
  else if(ev.kind==='price'){ sign.material.map=signTex(D.brand); sign.material.needsUpdate=true; addCoins(2,16); }
  else if(ev.kind==='pause'){ addCoins(1,12); } }

const clock=new THREE.Clock();
function tick(){ const dt=Math.min(clock.getDelta(),0.05),tt=clock.elapsedTime;
  mixers.forEach(m=>m.update(dt));
  const a=Math.sin(tt*0.18)*0.5; camera.position.set(Math.sin(a)*12.5,7.2,12.6); camera.lookAt(0,1.6,0.6);
  agents.forEach(ag=>{ if(ag._bubLife>0){ag._bubLife-=dt; ag.bub.material.opacity=Math.min(1,ag._bubLife); if(ag._bubLife<=0&&ag.state==='idle')setAgentAnim(ag,'Idle');} else ag.bub.material.opacity=0;
    ag.bub.position.set(ag.g.position.x,3.4+Math.sin(tt*2)*0.05,ag.g.position.z); });
  if(ready){ if(MODE==='m12')stepM12(dt); else stepM14(dt); }
  // 補貨木箱彈出
  for(let i=restockCrates.length-1;i>=0;i--){const o=restockCrates[i]; o.t+=dt; o.c.scale.setScalar(Math.min(1,o.t*3)); if(o.t>4){o.c.scale.multiplyScalar(0.92); if(o.c.scale.x<0.05){scene.remove(o.c);restockCrates.splice(i,1);}}}
  if(alertSprite&&alertSprite.material.opacity>0) alertSprite.position.y=5.0+Math.sin(tt*3)*0.08;
  // 顧客
  spawnCustomer._t=(spawnCustomer._t||0)-dt; if(spawnCustomer._t<=0&&customers.length<6&&ready){spawnCustomer(); spawnCustomer._t=1.6*(0.7+Math.random());}
  for(let i=customers.length-1;i>=0;i--){const o=customers[i],p=o.g.position;const dir=new THREE.Vector3(0,0,2.6).sub(p);const d=dir.length();
    if(d<0.8){scene.remove(o.g);customers.splice(i,1);}else{dir.normalize();p.addScaledVector(dir,dt*(o.useFox?2.0:1.3));o.g.lookAt(0,p.y,2.6);}}
  for(let i=coins.length-1;i>=0;i--){const o=coins[i];o.c.position.y+=o.v*dt;o.c.rotation.z+=dt*4;o.c.material.opacity-=dt*0.5;o.c.material.transparent=true;if(o.c.position.y>5){scene.remove(o.c);coins.splice(i,1);}}
  const pos=steam.geometry.attributes.position; for(let i=0;i<steamN;i++){let y=pos.getY(i)+dt*0.5;if(y>2.4)y=0;pos.setY(i,y);} pos.needsUpdate=true;
  dayTimer+=dt; if(dayTimer>5){dayTimer=0;day++;dayLabel.textContent='第 '+day+' 天';}
  renderer.render(scene,camera); requestAnimationFrame(tick);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
window.__shopReady=true;
</script>
