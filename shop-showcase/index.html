<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>我的 AI 小店 · M12 三角色在工作</title>
<style>
  :root { --orange:#e2570d; --ink:#181a1f; }
  * { margin:0; box-sizing:border-box; font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; }
  html,body { height:100%; overflow:hidden; background:#f3ead9; }
  #app { position:fixed; inset:0; }
  .hud { position:absolute; pointer-events:none; }
  .card { background:rgba(255,255,255,.85); backdrop-filter:blur(6px); border:1px solid #eaddcb;
          border-radius:16px; padding:11px 16px; box-shadow:0 10px 30px -16px rgba(60,40,10,.4); }
  #brandTag { top:18px; left:18px; }
  #brandTag .name { font-size:24px; font-weight:800; color:var(--ink); }
  #brandTag .sub { font-size:13px; color:#8a7a60; margin-top:2px; }
  #stats { top:18px; right:18px; text-align:right; min-width:150px; }
  #stats .day { font-size:13px; color:#8a7a60; }
  #stats .rev { font-size:28px; font-weight:900; color:var(--orange); line-height:1.1; }
  /* M12 決策摘要面板(連動課程內容) */
  #m12 { bottom:18px; left:18px; width:330px; }
  #m12 .h { font-size:12px; font-weight:800; letter-spacing:.1em; color:var(--orange); margin-bottom:7px; }
  #m12 .row { display:flex; gap:8px; font-size:13px; line-height:1.4; padding:4px 6px; border-radius:8px; transition:background .3s; }
  #m12 .row.active { background:#fff0e3; }
  #m12 .k { color:#8a7a60; white-space:nowrap; font-weight:700; }
  #m12 .v { color:var(--ink); }
  #m12 .v.hi { color:#c0392b; font-weight:800; }
  #controls { left:50%; bottom:20px; transform:translateX(-50%); pointer-events:auto; }
  .btn { pointer-events:auto; cursor:pointer; border:1px solid #eaddcb; border-radius:999px; padding:11px 20px;
         font-size:16px; font-weight:700; background:#fff; color:var(--ink); box-shadow:0 8px 22px -14px rgba(60,40,10,.5); }
  .btn.on { background:var(--orange); color:#fff; border-color:var(--orange); }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; font-size:20px; color:#8a7a60; background:#f3ead9; z-index:5; }
</style>
</head>
<body>
<div id="loading">載入小店中… 🏪</div>
<div id="app"></div>
<div class="hud card" id="brandTag"><div class="name" id="brandName">我的小店</div><div class="sub">三個 AI 角色正在幫你顧店</div></div>
<div class="hud card" id="stats"><div class="day" id="dayLabel">第 1 天</div><div class="rev" id="revLabel">$0</div></div>
<div class="hud card" id="m12">
  <div class="h">M12 決策摘要(三角色接力產出)</div>
  <div class="row" data-f="anom"><span class="k">① 檢查</span><span class="v" id="vAnom">-</span></div>
  <div class="row" data-f="insight"><span class="k">② 分析</span><span class="v" id="vInsight">-</span></div>
  <div class="row" data-f="action"><span class="k">③ 決策</span><span class="v" id="vAction">-</span></div>
  <div class="row" data-f="risk"><span class="k">風險</span><span class="v hi" id="vRisk">-</span></div>
</div>
<div class="hud" id="controls"><button class="btn on" id="aiBtn">🤖 AI 介入:開</button></div>

<script src="data.js" onerror="void 0"></script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { clone as skClone } from 'three/addons/utils/SkeletonUtils.js';

// ── 連動課程內容:M12 真實輸出(可由筆記本寫成 data.js 覆蓋)──
const D = window.SHOP_DATA || {
  brand: "大甲鍋貼",
  insight: "新品帶動整體 +18%,但有 2 筆高風險異常要先確認",
  anomalies: ["6/2 原味鍋貼 數量 -5(負值)", "6/3 原味鍋貼 數量 300(極端值)"],
  risk_level: "高",
  action_items: ["先查那兩筆單據", "泡菜內餡補貨", "外送加開一條線"],
};
document.getElementById('brandName').textContent = D.brand;
document.getElementById('vRisk').textContent = D.risk_level || "-";

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);
const scene = new THREE.Scene(); scene.background = new THREE.Color('#f3ead9'); scene.fog = new THREE.Fog('#f3ead9', 26, 46);
const camera = new THREE.PerspectiveCamera(44, innerWidth/innerHeight, 0.1, 100);
scene.add(new THREE.HemisphereLight('#fff6e8', '#d8c4a0', 1.0));
const sun = new THREE.DirectionalLight('#ffd9a0', 1.5); sun.position.set(6,13,7); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=44;
Object.assign(sun.shadow.camera,{left:-16,right:16,top:16,bottom:-16}); sun.shadow.radius=6; scene.add(sun);
const mat=(c,r=0.85,m=0)=>new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});

// 地面 + 廣場 + 門口地墊
const ground=new THREE.Mesh(new THREE.CylinderGeometry(15,15,0.6,48),mat('#e9d9bd')); ground.position.y=-0.3; ground.receiveShadow=true; scene.add(ground);
const plaza=new THREE.Mesh(new THREE.CylinderGeometry(8.4,8.4,0.62,48),mat('#f0e6d2')); plaza.position.y=-0.28; plaza.receiveShadow=true; scene.add(plaza);
const matAt=new THREE.Mesh(new THREE.CircleGeometry(1.5,24),mat('#e2570d',0.9)); matAt.rotation.x=-Math.PI/2; matAt.position.set(0,0.02,2.6); matAt.receiveShadow=true; scene.add(matAt);

// 小店(中央偏後)
const shop=new THREE.Group(); shop.position.set(0,0,-1.2); scene.add(shop);
const body=new THREE.Mesh(new RoundedBoxGeometry(5,3.4,4,4,0.45),mat('#f6c89a')); body.position.y=1.7; body.castShadow=body.receiveShadow=true; shop.add(body);
const roof=new THREE.Mesh(new THREE.ConeGeometry(3.25,1.5,4),mat('#c0633a')); roof.position.y=3.95; roof.rotation.y=Math.PI/4; roof.castShadow=true; shop.add(roof);
const door=new THREE.Mesh(new RoundedBoxGeometry(1.3,2.0,0.2,3,0.2),mat('#8a4a2a')); door.position.set(0,1.0,2.02); shop.add(door);
const winMat=new THREE.MeshStandardMaterial({color:'#ffe2a8',emissive:'#ffb347',emissiveIntensity:0.7,roughness:0.4});
for(const x of [-1.6,1.6]){const w=new THREE.Mesh(new RoundedBoxGeometry(1.0,1.0,0.15,3,0.15),winMat); w.position.set(x,1.9,2.0); shop.add(w);}
for(let i=0;i<7;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(0.72,0.12,0.9),mat(i%2?'#e2570d':'#fff4e6')); s.position.set(-2.16+i*0.72,2.95,2.35); s.rotation.x=-0.5; s.castShadow=true; shop.add(s);}
function signTex(t){const c=document.createElement('canvas');c.width=512;c.height=160;const x=c.getContext('2d');
  x.fillStyle='#fff7ec';x.fillRect(0,0,512,160);x.lineWidth=10;x.strokeStyle='#e2570d';x.strokeRect(8,8,496,144);
  x.fillStyle='#3a2a18';x.font='bold 84px "PingFang TC","Noto Sans TC",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(t,256,86);
  const tx=new THREE.CanvasTexture(c);tx.anisotropy=4;return tx;}
const sign=new THREE.Mesh(new THREE.PlaneGeometry(2.9,0.9),new THREE.MeshBasicMaterial({map:signTex(D.brand)})); sign.position.set(0,2.5,2.03); shop.add(sign);

// 程式畫的可愛道具:盆栽 / 木箱 / 燈籠
function plant(x,z){const g=new THREE.Group(); const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.24,0.5,12),mat('#c87f4a')); pot.position.y=0.25; pot.castShadow=true;
  const leaf=new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12),mat('#7bb661')); leaf.position.y=0.85; leaf.scale.y=1.2; leaf.castShadow=true; g.add(pot,leaf); g.position.set(x,0,z); scene.add(g);}
function crate(x,z,r=0){const m=new THREE.Mesh(new RoundedBoxGeometry(0.8,0.8,0.8,2,0.08),mat('#d8a86a')); m.position.set(x,0.4,z); m.rotation.y=r; m.castShadow=true; scene.add(m);}
function lantern(x,y,z){const g=new THREE.Group(); const b=new THREE.Mesh(new THREE.SphereGeometry(0.32,16,12),new THREE.MeshStandardMaterial({color:'#e8533a',emissive:'#e2570d',emissiveIntensity:0.5,roughness:0.5})); b.scale.y=0.85;
  const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.12,10),mat('#8a4a2a')); cap.position.y=0.34; g.add(b,cap); g.position.set(x,y,z); scene.add(g); return g;}
plant(-3.6,0.6); plant(3.7,0.4); plant(-2.8,-2.2); crate(3.4,-1.4); crate(3.9,-1.0,0.4); crate(3.6,-1.9,0.8);
const lanterns=[lantern(-2.7,3.0,0.6), lantern(2.7,3.0,0.6)];

// 蒸氣粒子(鍋貼熱氣)
const steamN=26, steamGeo=new THREE.BufferGeometry(), sp=new Float32Array(steamN*3), ss=new Float32Array(steamN);
for(let i=0;i<steamN;i++){sp[i*3]=(Math.random()-0.5)*1.4; sp[i*3+1]=Math.random()*2; sp[i*3+2]=-1.2+(Math.random()-0.5)*1.4; ss[i]=Math.random();}
steamGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
const steam=new THREE.Points(steamGeo,new THREE.PointsMaterial({color:'#ffffff',size:0.5,transparent:true,opacity:0.35,depthWrite:false}));
steam.position.set(0,3.6,0); scene.add(steam);

// 金幣
const coins=[], coinGeo=new THREE.CylinderGeometry(0.26,0.26,0.07,16);
const coinMat=new THREE.MeshStandardMaterial({color:'#ffcf4d',emissive:'#b97c00',emissiveIntensity:0.25,metalness:0.6,roughness:0.3});
function coinAt(x,z){const c=new THREE.Mesh(coinGeo,coinMat.clone()); c.rotation.x=Math.PI/2; c.position.set(x,2.4,z); c.castShadow=true; scene.add(c); coins.push({c,v:2.2+Math.random()});}

// 標籤 / 泡泡 精靈
function labelSprite(text,color){const c=document.createElement('canvas');c.width=320;c.height=80;const x=c.getContext('2d');
  x.fillStyle=color;const r=18;x.beginPath();x.roundRect(6,6,308,68,r);x.fill();
  x.fillStyle='#fff';x.font='bold 34px "PingFang TC","Noto Sans TC",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(text,160,42);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true})); s.scale.set(1.7,0.42,1); return s;}
function bubbleTex(text){const c=document.createElement('canvas');c.width=480;c.height=190;const x=c.getContext('2d');x.clearRect(0,0,480,190);
  x.fillStyle='#fff';x.strokeStyle='#eaddcb';x.lineWidth=4;x.beginPath();x.roundRect(8,8,464,140,26);x.fill();x.stroke();
  x.beginPath();x.moveTo(70,148);x.lineTo(54,184);x.lineTo(110,148);x.fillStyle='#fff';x.fill();
  x.fillStyle='#2b2118';x.font='600 36px "PingFang TC","Noto Sans TC",sans-serif';x.textAlign='center';x.textBaseline='middle';
  const ch=[...text];let ln='';const L=[];for(const k of ch){if(x.measureText(ln+k).width>410){L.push(ln);ln=k;}else ln+=k;}L.push(ln);
  L.slice(0,2).forEach((s,i)=>x.fillText(s,240,52+i*46));return new THREE.CanvasTexture(c);}

// HUD 連動
const m12rows={}; document.querySelectorAll('#m12 .row').forEach(r=>m12rows[r.dataset.f]=r);
const vAnom=document.getElementById('vAnom'),vInsight=document.getElementById('vInsight'),vAction=document.getElementById('vAction');
let anomI=0,actI=0;
function setActive(f){for(const k in m12rows)m12rows[k].classList.toggle('active',k===f);}

// 狀態
let aiOn=true, day=1, revenue=0, dayTimer=0;
const revLabel=document.getElementById('revLabel'),dayLabel=document.getElementById('dayLabel');
const aiBtn=document.getElementById('aiBtn');
aiBtn.onclick=()=>{aiOn=!aiOn; aiBtn.classList.toggle('on',aiOn); aiBtn.textContent=`🤖 AI 介入:${aiOn?'開':'關'}`; lanterns.forEach(l=>l.children[0].material.emissiveIntensity=aiOn?0.5:0.05);};

// ── 載入 GLTF 角色 ──
const loader=new GLTFLoader();
const load=(url)=>new Promise(res=>loader.load(url,res));
const mixers=[]; const agents=[]; const customers=[]; let foxGLTF,duckGLTF;
const AGENT_DEF=[
  {role:"資料檢查員",color:"#2f6fd0",x:-5.3}, {role:"分析洞察員",color:"#e2570d",x:-3.0}, {role:"決策摘要員",color:"#0e9b63",x:-0.7},
];
let ready=false, pipeT=0, pipeStage=0;
let orb; // 傳遞光球

Promise.all([
  load('./assets/RobotExpressive.glb'), load('./assets/Fox.glb'), load('./assets/Duck.glb')
]).then(([robot,fox,duck])=>{
  foxGLTF=fox; duckGLTF=duck;
  // 三個 agent = RobotExpressive 複製
  AGENT_DEF.forEach((d,i)=>{
    const g=skClone(robot.scene); g.scale.setScalar(0.34); g.position.set(d.x,0,3.4); g.rotation.y=0.2;
    g.traverse(o=>{if(o.isMesh){o.castShadow=true;}});
    const mx=new THREE.AnimationMixer(g); const idle=THREE.AnimationClip.findByName(robot.animations,'Idle')||robot.animations[0];
    const act=mx.clipAction(idle); act.play(); mixers.push(mx);
    const disc=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.7,0.08,20),mat(d.color,0.6)); disc.position.set(d.x,0.04,3.4); disc.receiveShadow=true; scene.add(disc);
    const lab=labelSprite(d.role,d.color); lab.position.set(d.x,2.5,3.4); scene.add(lab);
    const wave=THREE.AnimationClip.findByName(robot.animations,'Wave');
    const bub=new THREE.Sprite(new THREE.SpriteMaterial({map:bubbleTex('...'),transparent:true,opacity:0})); bub.scale.set(3.0,1.2,1); bub.position.set(d.x,3.5,3.4); scene.add(bub);
    scene.add(g); agents.push({g,mx,robotAnims:robot.animations,idleAct:act,bub,...d});
  });
  // 傳遞光球
  orb=new THREE.Mesh(new THREE.SphereGeometry(0.22,16,16),new THREE.MeshStandardMaterial({color:'#ffe08a',emissive:'#ffb020',emissiveIntensity:0.9}));
  orb.visible=false; scene.add(orb);
  ready=true; document.getElementById('loading').style.display='none';
  tick();
});

// 顧客(狐狸/鴨)走進來
function spawnCustomer(){
  const useFox=Math.random()<0.6; const src=useFox?foxGLTF:duckGLTF;
  const g=skClone(src.scene); const s=useFox?0.018:0.0024; g.scale.setScalar(s);
  g.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  const ang=(Math.random()*0.8+0.1)*Math.PI; g.position.set(Math.cos(ang)*8, 0, Math.abs(Math.sin(ang))*7+1.5);
  let mx=null;
  if(useFox && src.animations.length){ mx=new THREE.AnimationMixer(g); const w=THREE.AnimationClip.findByName(src.animations,'Walk')||src.animations[0]; mx.clipAction(w).play(); mixers.push(mx); }
  scene.add(g); customers.push({g,mx,useFox});
}

function pipelineStep(dt){
  if(!aiOn || !ready) return;
  pipeT-=dt;
  if(pipeT<=0){
    const a=agents[pipeStage];
    // agent 講話 + 揮手 + HUD 高亮
    if(pipeStage===0){const t=D.anomalies[anomI%D.anomalies.length]; vAnom.textContent=t; a.bub.material.map=bubbleTex("抓到:"+t); setActive('anom'); anomI++;}
    if(pipeStage===1){vInsight.textContent=D.insight; a.bub.material.map=bubbleTex(D.insight); setActive('insight');}
    if(pipeStage===2){const t=D.action_items[actI%D.action_items.length]; vAction.textContent=t; a.bub.material.map=bubbleTex("建議:"+t); setActive('action'); actI++;}
    a.bub.material.needsUpdate=true; a.bub.material.opacity=1; a._bubLife=2.4;
    const wave=THREE.AnimationClip.findByName(a.robotAnims,'Wave'); if(wave){const w=a.mx.clipAction(wave); w.reset();w.setLoop(THREE.LoopOnce);w.clampWhenFinished=false; w.play(); }
    // 光球移到此 agent,下一步往右;到第三個 → 決策傳到店裡(成交)
    if(orb){orb.visible=true; orb.position.set(a.x,2.1,3.4);}
    if(pipeStage===2){ for(let k=0;k<3;k++) setTimeout(()=>{revenue+=aiOn?(30+Math.random()*20|0):0; revLabel.textContent='$'+revenue.toLocaleString(); coinAt((Math.random()-0.5)*2,2.0);},k*180); }
    pipeStage=(pipeStage+1)%3; pipeT=1.6;
  }
}

const clock=new THREE.Clock();
function tick(){
  const dt=Math.min(clock.getDelta(),0.05), tt=clock.elapsedTime;
  mixers.forEach(m=>m.update(dt));
  // 相機:輕微擺動的正面視角(看得清楚 agents + 店)
  const a=Math.sin(tt*0.18)*0.5; camera.position.set(Math.sin(a)*12.5, 7.2, 12.5); camera.lookAt(0,1.6,0.6);
  // 光球漂浮
  if(orb&&orb.visible){orb.position.y=2.1+Math.sin(tt*4)*0.08; orb.rotation.y+=dt*3;}
  // agent 泡泡淡出
  agents.forEach(a=>{ if(a._bubLife>0){a._bubLife-=dt; a.bub.material.opacity=Math.min(1,a._bubLife);} else a.bub.material.opacity=0; a.bub.position.y=3.5+Math.sin(tt*2)*0.05;});
  pipelineStep(dt);
  // 顧客上門
  spawnCustomer._t=(spawnCustomer._t||0)-dt;
  if(spawnCustomer._t<=0 && customers.length<6 && ready){spawnCustomer(); spawnCustomer._t=(aiOn?1.4:2.6)*(0.7+Math.random());}
  for(let i=customers.length-1;i>=0;i--){const o=customers[i],p=o.g.position; const dir=new THREE.Vector3(0,0,2.6).sub(p); const d=dir.length();
    if(d<0.8){scene.remove(o.g); customers.splice(i,1);} else {dir.normalize(); p.addScaledVector(dir,dt*(o.useFox?2.0:1.3)); o.g.lookAt(0,p.y,2.6);} }
  // 金幣上飄
  for(let i=coins.length-1;i>=0;i--){const o=coins[i]; o.c.position.y+=o.v*dt; o.c.rotation.z+=dt*4; o.c.material.opacity-=dt*0.5; o.c.material.transparent=true; if(o.c.position.y>5){scene.remove(o.c); coins.splice(i,1);}}
  // 蒸氣
  const pos=steam.geometry.attributes.position; for(let i=0;i<steamN;i++){let y=pos.getY(i)+dt*0.5; if(y>2.4)y=0; pos.setY(i,y);} pos.needsUpdate=true;
  // 天數
  dayTimer+=dt; if(dayTimer>5){dayTimer=0; day++; dayLabel.textContent='第 '+day+' 天';}
  renderer.render(scene,camera); requestAnimationFrame(tick);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);});
window.__shopReady=true;
</script>
</body>
</html>
