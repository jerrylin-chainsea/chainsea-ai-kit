name: U11 Ops Agent Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  ops-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate report from ops agent roles
        run: python ops-agent-lab/run_ops_check.py --write-report

      - name: Generate LINE Flex payload in mock mode
        run: node line-lab/sendLineAlert.js --flex

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: u11-ops-agent-output
          path: |
            data-lab/report.json
            line-lab/line-flex-payload.json
